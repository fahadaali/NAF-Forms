name: Deploy to Cloudflare

# يعمل يدويًا من تبويب Actions، وعند كل دفع إلى main.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تثبيت الاعتماديات
        run: npm ci

      # إنشاء قاعدة D1 إن لم تكن موجودة، وحقن معرّفها في wrangler.toml
      - name: تجهيز قاعدة D1
        run: |
          DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="naf-forms") | .uuid' | head -1)
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            npx wrangler d1 create naf-forms
            DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="naf-forms") | .uuid' | head -1)
          fi
          echo "قاعدة D1: $DB_ID"
          sed -i "s/<D1_DATABASE_ID>/$DB_ID/" wrangler.toml

      # إنشاء حاوية R2 (يتجاهل إن كانت موجودة)
      - name: تجهيز حاوية R2
        run: npx wrangler r2 bucket create naf-forms-uploads || true

      # تطبيق الجداول وبذر المسؤول (آمن للتكرار)
      - name: هجرات D1 وبذر المسؤول
        run: |
          npx wrangler d1 execute naf-forms --remote --file=cloudflare/d1/0001_init.sql
          npx wrangler d1 execute naf-forms --remote --file=cloudflare/d1/0002_seed_admin.sql

      - name: بناء التطبيق لـ Workers
        run: npm run cf:build

      - name: النشر
        run: npm run cf:deploy

      # ضبط سرّ الجلسات بعد وجود الـ Worker (مرة واحدة، يُولَّد تلقائيًا)
      - name: ضبط SESSION_SECRET
        run: |
          if ! npx wrangler secret list 2>/dev/null | grep -q SESSION_SECRET; then
            openssl rand -hex 32 | npx wrangler secret put SESSION_SECRET
            echo "تم ضبط SESSION_SECRET (أعد التشغيل مرة أخرى ليأخذ مفعوله في كل الطلبات)."
          else
            echo "SESSION_SECRET مضبوط مسبقًا."
          fi
